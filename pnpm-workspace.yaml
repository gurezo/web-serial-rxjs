packages:
  - 'packages/*'

allowBuilds:
  '@parcel/watcher': true
  '@swc/core': true
  esbuild: true
  lmdb: true
  msgpackr-extract: true
  nx: true

minimumReleaseAgeExclude:
  # Nx migration (#340): allow recently published deps until they mature (7 days)
  - '@angular/*'
  - '@angular-devkit/*'
  - '@commitlint/*'
  - '@eslint/*'
  - '@inquirer/*'
  - '@nx/*'
  - '@schematics/*'
  - '@sveltejs/*'
  - '@swc/*'
  - '@types/node'
  - '@types/react'
  - '@typescript-eslint/*'
  - '@vitest/*'
  - '@vue/*'
  - esrap
  - eslint
  - eslint-plugin-playwright
  - eslint-plugin-svelte
  - nx
  - react
  - react-dom
  - svelte
  - svelte-check
  - svelte-eslint-parser
  - tinyglobby
  - tmp
  - typescript-eslint
  - vite
  - vitest
  - vue
  - vue-tsc
  - '@esbuild/*'
  - esbuild

# Malicious releases are often detected and removed within a week.
# config = 7 day x 24h x 60 min
minimumReleaseAge: 10080

shamefullyHoist: true
