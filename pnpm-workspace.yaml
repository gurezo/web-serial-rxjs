packages:
  - 'packages/*'

allowBuilds:
  '@parcel/watcher': true
  '@swc/core': true
  esbuild: true
  lmdb: true
  msgpackr-extract: true
  nx: true

# Malicious releases are often detected and removed within a week.
# config = 7 day x 24h x 60 min
# minimumReleaseAge: 10080

shamefullyHoist: true
