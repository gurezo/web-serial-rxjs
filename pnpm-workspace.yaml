packages:
  - 'packages/*'

allowBuilds:
  '@parcel/watcher': true
  '@swc/core': true
  esbuild: true
  lmdb: true
  msgpackr-extract: true
  nx: true

minimumReleaseAgeExclude:
  # Allow recently published deps from toolchain migrations until they mature (7 days)
  - '@angular/*'
  - '@angular-devkit/*'
  - '@commitlint/*'
  - '@esbuild/*'
  - '@eslint/*'
  - '@inquirer/*'
  - '@nx/*'
  - '@playwright/*'
  - '@schematics/*'
  - '@sveltejs/*'
  - '@swc/*'
  - '@types/*'
  - '@typescript-eslint/*'
  - '@vitest/*'
  - '@vue/*'
  - esbuild
  - eslint
  - eslint-plugin-*
  - esrap
  - linkify-it
  - markdown-it
  - nx
  - playwright*
  - react
  - react-dom
  - svelte*
  - tinyglobby
  - tmp
  - typedoc
  - typescript-eslint
  - vite
  - vitest
  - vue*

# Malicious releases are often detected and removed within a week.
# config = 7 day x 24h x 60 min
minimumReleaseAge: 10080

shamefullyHoist: true
