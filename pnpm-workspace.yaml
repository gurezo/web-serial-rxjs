packages:
  - 'packages/*'

allowBuilds:
  '@parcel/watcher': true
  '@swc/core': true
  esbuild: true
  lmdb: true
  msgpackr-extract: true
  nx: true

minimumReleaseAgeExclude:
  # Nx migration (#340): allow recently published deps until they mature (7 days)
  - '@angular/*'
  - '@angular-devkit/*'
  - '@commitlint/*'
  - '@nx/*'
  - '@schematics/*'
  - '@swc/*'
  - '@eslint/plugin-kit@0.7.2'
  - '@typescript-eslint/*'
  - '@types/node@25.9.1'
  - '@types/react@19.2.15'
  - '@vitest/*'
  - '@vue/*'
  - eslint@10.4.1
  - eslint-plugin-playwright@2.10.4
  - eslint-plugin-svelte@3.19.0
  - nx@22.7.5
  - svelte@5.56.0
  - svelte-eslint-parser@1.7.0
  - tmp@0.2.6
  - typescript-eslint@8.60.0
  - vite@8.0.14
  - vitest@4.1.7
  - vue@3.5.35
  - vue-tsc@3.3.3

# Malicious releases are often detected and removed within a week.
# config = 7 day x 24h x 60 min
minimumReleaseAge: 10080

shamefullyHoist: true
