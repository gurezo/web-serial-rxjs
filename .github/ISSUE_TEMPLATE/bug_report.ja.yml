name: 🐛 バグ報告
description: web-serial-rxjs の不具合報告
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        ありがとうございます！再現可能な情報があると調査が速くなります。
        ⚠️ **注意**: Web Serial API は Chromium 系ブラウザのみ対応です（Chrome/Edge/Opera など）。

  - type: input
    id: package_version
    attributes:
      label: web-serial-rxjs バージョン
      description: "例: @gurezo/web-serial-rxjs@2.1.0"
      placeholder: "@gurezo/web-serial-rxjs@x.y.z"
    validations:
      required: true

  - type: input
    id: rxjs_version
    attributes:
      label: RxJS バージョン
      description: "例: rxjs@7.8.1（peer dependency、最小 ^7.8.0）"
      placeholder: "rxjs@7.x / 8.x"
    validations:
      required: true

  - type: dropdown
    id: runtime
    attributes:
      label: ランタイム
      options:
        - Browser (Web App)
        - Electron
        - Tauri
        - Other
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: ブラウザ / バージョン
      description: "例: Chrome 120 / Edge 120 / Opera 105 など（Chromium 系かどうか重要）"
      placeholder: "Chrome xx / Edge xx / Opera xx"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "macOS / Windows / Linux"
    validations:
      required: true

  - type: dropdown
    id: framework
    attributes:
      label: フレームワーク
      options:
        - Vanilla JS/TS
        - Angular
        - React
        - Vue
        - Svelte
        - Other
    validations:
      required: true

  - type: input
    id: bundler
    attributes:
      label: Bundler / ビルドツール
      description: "例: Vite / Webpack / Rspack / Nx / etc."
      placeholder: "Vite / Webpack / Nx / ..."
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: 何が起きましたか？
      description: 実際に起きたこと（エラー内容や挙動）
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 再現手順
      description: 再現手順（番号付きで）
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期待される動作
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: ログ / エラースタック
      description: コンソールログ、スタックトレース、スクリーンショット（あれば）を貼ってください
      render: shell
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: チェックリスト
      options:
        - label: Chromium 系ブラウザで試しました（Web Serial API 対応ブラウザ）
          required: true
        - label: README の Quick Start を確認しました
          required: false
