name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Show bundled npm version
        shell: bash
        run: npm -v

      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - run: pnpm exec nx build web-serial-rxjs
      - run: pnpm exec nx run web-serial-rxjs:verify-dist
      - name: Verify npm package includes required files
        shell: bash
        run: |
          set -euo pipefail
          PACK_RESULT="$(npm pack --dry-run --json ./packages/web-serial-rxjs)"

          node -e '
            const result = JSON.parse(process.argv[1]);
            const files = (result[0]?.files ?? []).map((file) => file.path);
            const required = [
              "README.md",
              "README.ja.md",
              "dist/index.mjs",
              "dist/index.d.ts",
            ];
            const missing = required.filter((path) => !files.includes(path));

            if (missing.length > 0) {
              console.error(`Missing files in npm pack output: ${missing.join(", ")}`);
              process.exit(1);
            }

            console.log("Verified npm pack includes required publish files.");
          ' "$PACK_RESULT"

      # リリース添付用の zip を作る（パッケージ単位）
      - name: Create release zip
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          ZIP_NAME="web-serial-rxjs-${VERSION}.zip"
          cd packages/web-serial-rxjs
          zip -r "../../${ZIP_NAME}" . \
            -x "node_modules/*" \
               ".git/*" \
               ".DS_Store"

      # publish は token を使わず、OIDC のみで実施（設定を隔離）
      - name: Publish to npm (Trusted Publishing / OIDC)
        shell: bash
        env:
          NODE_AUTH_TOKEN: ""
          NPM_CONFIG_USERCONFIG: ${{ github.workspace }}/.npmrc-ci
          HOME: ${{ github.workspace }}/_home_ci
        run: |
          set -euo pipefail
          mkdir -p "${HOME}"

          echo "registry=https://registry.npmjs.org/" > "${NPM_CONFIG_USERCONFIG}"
          echo "always-auth=false" >> "${NPM_CONFIG_USERCONFIG}"

          npm config delete //registry.npmjs.org/:_authToken || true
          npm config delete _authToken || true

          cd packages/web-serial-rxjs
          pnpm dlx npm@11.5.1 publish --access public --provenance

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            web-serial-rxjs-*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
